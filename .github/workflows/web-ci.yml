name: Web CI

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/web-ci.yml"]
  pull_request:
    branches: [main]
    paths: ["web/**", ".github/workflows/web-ci.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
